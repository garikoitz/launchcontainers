  # ---------------------------------------------------------------------------
  # Job 3: Build Sphinx docs and deploy to GitHub Pages
  # Only runs on direct push to master (not on PRs)
  # ---------------------------------------------------------------------------
  build-docs:
    runs-on: ubuntu-latest
    #needs: format   # wait for formatting to finish first
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/data_cleaning')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Install launchcontainers + docs dependencies
        run: |
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build Documentation
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd docs
          make html

      - name: Create .nojekyll file
        # Prevents GitHub Pages from ignoring folders that start with underscore
        # (important because Sphinx outputs to _build/, _static/, etc.)
        run: touch docs/_build/html/.nojekyll

      - name: Upload build as artifact
        # Saves the HTML as a downloadable artifact in the Actions run
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html

      - name: Clean build folder
        run: rm -rf docs/_build/*
